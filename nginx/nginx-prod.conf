upstream app {
    server pw-server-tools:8080;
}

upstream equip {
    server pw-equip:8082;
}

server {
    listen 80;
    server_name gamedevforge.ovh www.gamedevforge.ovh;
    
    # Handle phpMyAdmin separately
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Fix phpMyAdmin redirects
        proxy_redirect / /phpmyadmin/;
        proxy_redirect /index.php /phpmyadmin/index.php;
        
        # Ensure proper HTTP version forwarding
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gamedevforge.ovh www.gamedevforge.ovh;
    
    ssl_certificate /etc/ssl/certificate-cloudfare.pem;
    ssl_certificate_key /etc/ssl/certificate-cloudfare.key;

    # Handle phpMyAdmin separately
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Fix phpMyAdmin redirects
        proxy_redirect / /phpmyadmin/;
        proxy_redirect /index.php /phpmyadmin/index.php;
        
        # Ensure proper HTTP version forwarding
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Route /equip requests to pw-equip container
    location /equip {
        proxy_pass http://equip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Ensure proper HTTP version forwarding
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy everything else to your Go application
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Ensure proper HTTP version forwarding
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

