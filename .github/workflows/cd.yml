name: CD

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: Setup Mise
        uses: jdx/mise-action@v2
        with:
          cache: false
          experimental: true
  
      - name: Build Windows
        run: go build -ldflags="-H windowsgui" -o pw-equip-changer.exe

      - name: Build Linux
        run: go build -o pw-equip-changer

      - name: Build macOS
        run: go build -o pw-equip-changer

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          path: .
          name: pw-equip-changer.exe