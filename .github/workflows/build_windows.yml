name: Build Windows

on:
    push:
        branches: [main]
      
jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
  
      - name: Build Windows
        run: |
            go install fyne.io/tools/cmd/fyne@latest \
            fyne package -os windows -icon media/icon.jpg -release

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          path: pw-equip-changer.exe
          name: pw-equip-changer.exe
          overwrite: true
        
        
        
