name: Build Windows

on:
    workflow_run:
        workflows: ["CD"]
        branches: [main]
        types: 
            - completed
      
jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
  
      - name: Build Windows
        run: go build -ldflags="-H windowsgui" -o pw-equip-changer.exe

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          path: .
          name: pw-equip-changer.exe
        
        
        
