services:
  mysql-equip-dev:
    image: mysql:latest
    container_name: mysql-equip-dev
    env_file:
      - ../cmd/server/.env-dev
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PORT: ${MYSQL_PORT}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - $HOME/docker-volumes/mysql-equip-dev:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}" ]
      timeout: 20s
      retries: 10
    networks:
      - docker_pw-network

  phpmyadmin-equip:
    image: phpmyadmin:apache
    container_name: phpmyadmin-equip
    ports:
      - "8091:80"
    environment:
      PMA_HOST: mysql-equip-dev
      PMA_PORT: 3306
    depends_on:
      mysql-equip-dev:
        condition: service_healthy
    networks:
      - docker_pw-network

volumes:
  mysql_equip_data:


networks:
  docker_pw-network:
    external: true
