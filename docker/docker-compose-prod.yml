services:
  mysql-equip-prod:
    image: mysql:latest
    container_name: mysql-equip-prod
    env_file:
      - ../cmd/server/.env-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PORT: ${MYSQL_PORT}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ~/docker-volumes/mysql-equip-prod:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}" ]
      timeout: 20s
      retries: 10
    networks:
      - docker_pw-network

  phpmyadmin-equip:
    image: phpmyadmin:apache
    container_name: phpmyadmin-equip
    ports:
      - "8091:80"
    environment:
      PMA_HOST: mysql-equip-prod
      PMA_PORT: 3306
    depends_on:
      mysql-equip-prod:
        condition: service_healthy
    networks:
      - docker_pw-network

  pw-equip-prod:
    image: rtanoeiro/pw-equip:prod
    container_name: pw-equip-prod
    ports:
      - "${API_PORT}:${API_PORT}"
    env_file:
      - ../cmd/server/.env-prod
    environment:
      ENV: "prod"
      API_PORT: "${API_PORT}"
      MYSQL_HOST: mysql-equip-prod
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PORT: "3306"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ../download:/app/download
      - ../static:/app/static
    depends_on:
      mysql-equip-prod:
        condition: service_healthy
    networks:
      - docker_pw-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${API_PORT}/equip/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_equip_data:


networks:
  docker_pw-network:
    external: true
